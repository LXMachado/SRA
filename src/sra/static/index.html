<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Research Agent</title>
    <style>
        :root {
            --bg: #f5f1e9;
            --bg-ink: #1d1a17;
            --card: rgba(255, 250, 242, 0.9);
            --border: rgba(120, 103, 86, 0.28);
            --text: #2d241e;
            --text-muted: #645648;
            --accent: #146356;
            --accent-hover: #0f4b41;
            --success: #1f8f5f;
            --error: #b4233c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Avenir Next', 'Futura', 'Trebuchet MS', sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(20, 99, 86, 0.14) 0%, transparent 35%),
                radial-gradient(circle at 80% 10%, rgba(138, 111, 74, 0.18) 0%, transparent 30%),
                linear-gradient(165deg, #f5f1e9 0%, #ece4d8 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem 0 3rem;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.45s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.7rem);
            letter-spacing: 0.01em;
            font-weight: 700;
            margin-bottom: 0.35rem;
            color: var(--bg-ink);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 16px 40px rgba(70, 53, 39, 0.09);
            animation: fadeUp 0.55s ease-out;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #fffefb;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(20, 99, 86, 0.16);
        }

        .input-row {
            display: flex;
            gap: 1rem;
        }

        .input-row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s ease, box-shadow 0.2s;
            box-shadow: 0 10px 24px rgba(20, 99, 86, 0.2);
        }

        button:hover { background: var(--accent-hover); }
        button:active { transform: translateY(1px); }
        button:disabled {
            background: #b8aba0;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .status.loading {
            display: block;
            background: rgba(20, 99, 86, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .status.error {
            display: block;
            background: rgba(244, 63, 94, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .report {
            display: none;
        }

        .report.show {
            display: block;
        }

        .report h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .report h3 {
            font-size: 1rem;
            margin: 1.5rem 0 0.75rem;
            color: var(--accent);
        }

        .summary {
            background: rgba(255, 255, 255, 0.56);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .section-content {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .sources {
            margin-top: 1rem;
        }

        .source-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .source-item:last-child { border-bottom: none; }

        .source-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .source-link:hover { text-decoration: underline; }

        .citation {
            color: var(--success);
            font-weight: 500;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            body {
                padding-top: 1.25rem;
            }

            .card {
                padding: 1rem;
                border-radius: 14px;
            }

            .input-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sentinel Research Agent</h1>
            <p class="subtitle">AI-powered research assistant with live web retrieval</p>
        </header>

        <div class="card">
            <form id="research-form">
                <div class="form-group">
                    <label for="query">Research Query</label>
                    <input type="text" id="query" placeholder="e.g., How is the EU regulating frontier AI safety tests?" required>
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label for="max-iters">Max Iterations</label>
                        <input type="number" id="max-iters" value="4" min="1" max="20">
                    </div>
                </div>
                <button type="submit" id="submit-btn">Run Research</button>
            </form>
        </div>

        <div id="status" class="status"></div>

        <div id="report" class="card report">
            <h2 id="report-topic"></h2>
            <div class="summary" id="report-summary"></div>
            <div id="report-sections"></div>
            <div class="sources">
                <h3>Sources</h3>
                <div id="report-sources"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('research-form');
        const statusEl = document.getElementById('status');
        const reportEl = document.getElementById('report');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('query').value.trim();
            const max_iters = parseInt(document.getElementById('max-iters').value);

            if (!query) return;

            submitBtn.disabled = true;
            statusEl.className = 'status loading';
            statusEl.textContent = 'Researching... this may take a minute.';
            reportEl.classList.remove('show');

            try {
                const res = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_iters })
                });

                const text = await res.text();
                if (!res.ok) {
                    try {
                        const err = JSON.parse(text);
                        throw new Error(err.detail || `Request failed (${res.status})`);
                    } catch (parseErr) {
                        throw new Error(`Request failed (${res.status}): ${text || 'No response'}`);
                    }
                }

                try {
                    const data = JSON.parse(text);
                    displayReport(data);
                    statusEl.className = 'status';
                    statusEl.textContent = '';
                } catch (parseErr) {
                    throw new Error('Invalid JSON response from server');
                }
            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = err.message;
                reportEl.classList.remove('show');
            } finally {
                submitBtn.disabled = false;
            }
        });

        function displayReport(data) {
            document.getElementById('report-topic').textContent = data.topic;
            document.getElementById('report-summary').textContent = data.executive_summary;

            const sectionsDiv = document.getElementById('report-sections');
            sectionsDiv.innerHTML = '';
            (data.sections || []).forEach((s) => {
                const title = document.createElement('h3');
                title.textContent = s.section_title || 'Section';
                const content = document.createElement('div');
                content.className = 'section-content';
                content.textContent = s.content || '';
                sectionsDiv.appendChild(title);
                sectionsDiv.appendChild(content);
            });

            const sourcesDiv = document.getElementById('report-sources');
            sourcesDiv.innerHTML = '';
            (data.sources || []).forEach((src, i) => {
                const item = document.createElement('div');
                item.className = 'source-item';

                const link = document.createElement('a');
                link.href = src.url || '#';
                link.className = 'source-link';
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.textContent = `[S${i + 1}] ${src.title || src.url || 'Untitled source'}`;

                item.appendChild(link);
                sourcesDiv.appendChild(item);
            });

            reportEl.classList.add('show');
        }
    </script>
</body>
</html>
